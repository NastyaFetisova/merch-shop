<svg xmlns="http://www.w3.org/2000/svg" viewBox="100 50 500 80" width="200" height="60">
  <defs>
    Градиент из белого в серебристый для лёгкого объёма
    <linearGradient id="noxisWhite" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CCCCCC;stop-opacity:1" />
    </linearGradient>

    Мягкое белое свечение
    <filter id="whiteGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur1" />
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Тень для объёма (темная, но в прозрачном фоне не видна, только на буквах) -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  

  <!-- Основной текст NOXIS -->
  <text x="310" y="125" font-family="'Bungee', Impact, sans-serif" font-size="90" font-weight="500" text-anchor="middle" fill="url(#noxisWhite)" filter="url(#shadow)" letter-spacing="10">
    NOXIS
  </text>

  
</svg>