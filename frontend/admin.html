<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/admin.css">
</head>

<body>
    <header>
        <div class="header__content">
            <nav class="menu">
                <a href="./order.html">Как заказать</a>
                <a href="./care.html">Как ухаживать</a>
            </nav>
            <div class="logo">
                <a href="./index.html">
                    <img src="./image/logo.svg" alt="logo">
                </a>
            </div>
            <div class="icons">
                <div class="order">
                    <a href="./cart.html">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                    </a>
                </div>
                <div class="admin">
                    <a href="./admin.html">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
                            <circle cx="12" cy="8" r="4" fill="none" stroke="white" stroke-width="1.5" />
                            <path d="M4 20c0-4 4-6 8-6s8 2 8 6" fill="none" stroke="white" stroke-width="1.5"
                                stroke-linecap="round" />
                        </svg>
                    </a>
                </div>
            </div>

        </div>
    </header>
    <main>
        <div id="wrapper-modal-password" class="modal-overlay">
            <div class="modal modal-password">

                <div class="modal-password__content">
                    <p>Введите пароль</p>
                    <input type="password" class="input-password" placeholder="Пароль">
                    <button class="modal-enter">Войти</button>
                </div>
            </div>
        </div>

        <div id="wrapper-modal-add" class="modal-overlay">
            <div class="modal modal-add">

                <form class="modal-add__content" id="addProductForm">
                    <h3>Новый товар</h3>

                    <input type="text" class="add-name" placeholder="Название товара">
                    <input type="number" class="add-price" placeholder="Цена">
                    <textarea class="add-description" placeholder="Описание" rows="2"></textarea>
                    <input type="text" class="add-image" placeholder="URL изображения">

                    <select class="add-category">
                        <option value="1">Футболки и лонгсливы</option>
                        <option value="2">Худи и толстовки</option>
                        <option value="3">Штаны</option>
                        <option value="4">Аксессуары</option>
                    </select>

                    <div class="add-sizes">
                        <div class="size-row">
                            <span>S</span>
                            <input type="number" class="size-s" placeholder="кол-во" value="0">
                        </div>
                        <div class="size-row">
                            <span>M</span>
                            <input type="number" class="size-m" placeholder="кол-во" value="0">
                        </div>
                        <div class="size-row">
                            <span>L</span>
                            <input type="number" class="size-l" placeholder="кол-во" value="0">
                        </div>
                        <div class="size-row">
                            <span>XL</span>
                            <input type="number" class="size-xl" placeholder="кол-во" value="0">
                        </div>
                    </div>
                    <div class="wrapper-btn-form">
                        <button class="submit-product">Добавить товар</button>
                        <button class="submit-remove">Очистить форму</button>
                    </div>

                </form>
            </div>
        </div>
    </main>
    <footer>
        <div class="footer__container">
            <div class="footer__copyright">
                © 2026 NOXIS. Учебный проект. Все товары и изображения принадлежат их владельцам.
            </div>
            <div class="footer__social">
                <a href="#">Telegram</a>
                <a href="#">Instagram</a>
            </div>
        </div>
    </footer>
    <script src="./validate.js"></script>
    <script src="./admin.js"></script>
</body>

</html>
