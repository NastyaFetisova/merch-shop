<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">

</head>

<body>
    <header>
        <div class="header__content">
            <nav class="menu">
                <a href="#">Мерч</a>
                <a href="#">О нас</a>
                <a href="#">Как ухаживать</a>
            </nav>
            <div class="logo">
                <a href="/">
                    <img src="./image/logo.svg" alt="logo">
                </a>
            </div>
            <div class="admin">
                <a href="#">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
                        <circle cx="12" cy="8" r="4" fill="none" stroke="white" stroke-width="1.5" />
                        <path d="M4 20c0-4 4-6 8-6s8 2 8 6" fill="none" stroke="white" stroke-width="1.5"
                            stroke-linecap="round" />
                    </svg>
                </a>
            </div>
        </div>
    </header>
    <main>
        <div class="main__content">
            <div class="main__person">
                <div class="main__btns">
                    <button class="main__btn-outline">Смотреть мерч</button>
                </div>
            </div>


            <div class="catalog">
                <aside class="catalog__filters">
                    <form class="filters" action="/catalog" method="GET">
                        <h3 class="filters__title">Фильтры</h3>

                        <!-- Категории -->
                        <div class="filters__group">
                            <label class="filters__label">Категория</label>
                            <select name="category" class="filters__select">
                                <option value="">Все</option>
                                <option value="1">Футболки и лонгсливы</option>
                                <option value="2">Худи и толстовки</option>
                                <option value="3">Штаны</option>
                                <option value="4">Аксессуары</option>
                            </select>
                        </div>

                        <!-- Размеры -->
                        <div class="filters__group">
                            <label class="filters__label">Размер</label>
                            <div class="filters__sizes">
                                <label class="filters__size">
                                    <input type="checkbox" name="size[]" value="S"> S
                                </label>
                                <label class="filters__size">
                                    <input type="checkbox" name="size[]" value="M"> M
                                </label>
                                <label class="filters__size">
                                    <input type="checkbox" name="size[]" value="L"> L
                                </label>
                                <label class="filters__size">
                                    <input type="checkbox" name="size[]" value="XL"> XL
                                </label>
                            </div>
                        </div>

                        <!-- Цена -->
                        <div class="filters__group">
                            <label class="filters__label">Цена</label>
                            <div class="filters__price">
                                <input type="number" name="price_from" placeholder="от" class="filters__input">
                                <input type="number" name="price_to" placeholder="до" class="filters__input">
                            </div>
                        </div>

                        <!-- Сортировка -->
                        <div class="filters__group">
                            <label class="filters__label">Сортировка</label>
                            <select name="sort" class="filters__select">
                                <option value="price_asc">По возрастанию цены</option>
                                <option value="price_desc">По убыванию цены</option>
                            </select>
                        </div>

                        <!-- Кнопки -->
                        <div class="filters__buttons">
                            <button type="submit" class="filters__submit">Применить</button>
                            <a href="/catalog" class="filters__reset">Сбросить</a>
                        </div>
                    </form>
                </aside>
                <div class="catalog__products">
                    <template id="cardTemplate">
                        <div class="card">
                            <div class="card__photo">
                                <img src="" alt="">
                            </div>
                            <h2 class="card__name"></h2>
                            <p class="card__price"></p>
                            <button class="card__buy">Купить</button>
                        </div>
                    </template>
                </div>
            </div>
            <footer>
                <div class="footer__container">
                    <div>© 2026 KIX. Учебный проект. Все товары и изображения принадлежат их владельцам.</div>
                    <div>
                        <a href="#">Telegram</a>
                        <a href="#">Instagram</a>
                    </div>
                </div>
            </footer>
        </div>
    </main>
    <script src="./script.js"></script>
</body>

</html>
