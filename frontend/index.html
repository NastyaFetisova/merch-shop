<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">

</head>

<body>
    <header>
        <div class="header__content">
            <nav class="menu">
                <a href="./order.html">Как заказать</a>
                <a href="./care.html">Как ухаживать</a>
            </nav>
            <div class="logo">
                <a href="./index.html">
                    <img src="./image/logo.svg" alt="logo">
                </a>
            </div>
            <div class="icons">
                <div class="order">
                    <a href="./cart.html">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                    </a>
                </div>
                <div class="admin">
                    <a href="./admin.html">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
                            <circle cx="12" cy="8" r="4" fill="none" stroke="white" stroke-width="1.5" />
                            <path d="M4 20c0-4 4-6 8-6s8 2 8 6" fill="none" stroke="white" stroke-width="1.5"
                                stroke-linecap="round" />
                        </svg>
                    </a>
                </div>
            </div>

        </div>
    </header>
    <main>
        <div class="main__content">

            <div class="main__person">

                <!-- ВИДЕО-ФОН -->
                <div class="video-background">
                    <video autoplay muted loop playsinline>
                        <source src="./image/video.mp4" type="video/mp4">
                        Твой браузер не поддерживает тег video.
                    </video>
                </div>
                <!-- КНОПКИ ОСТАЮТСЯ -->
                <div class="main__btns">
                    <button class="main__btn-outline">Смотреть мерч</button>
                </div>
            </div>


            <div class="catalog">
                <aside class="catalog__filters">
                    <form class="filters" action="/catalog" method="GET">
                        <h3 class="filters__title">Фильтры</h3>

                        <!-- Категории -->
                        <div class="filters__group">
                            <label class="filters__label">Категория</label>
                            <select name="category" class="filters__select">
                                <option value="" selected>Все</option>
                                <option value="1">Футболки и лонгсливы</option>
                                <option value="2">Худи и толстовки</option>
                                <option value="3">Штаны</option>
                                <option value="4">Аксессуары</option>
                            </select>
                        </div>

                        <!-- Размеры -->
                        <div class="filters__group">
                            <label class="filters__label">Размер</label>
                            <div class="filters__sizes">
                                <label class="filters__size">
                                    <input type="radio" name="size" value="" checked> Все
                                </label>
                                <label class="filters__size">
                                    <input type="radio" name="size" value="S"> S
                                </label>
                                <label class="filters__size">
                                    <input type="radio" name="size" value="M"> M
                                </label>
                                <label class="filters__size">
                                    <input type="radio" name="size" value="L"> L
                                </label>
                                <label class="filters__size">
                                    <input type="radio" name="size" value="XL"> XL
                                </label>
                            </div>
                        </div>

                        <!-- Цена -->
                        <div class="filters__group">
                            <label class="filters__label">Цена</label>
                            <div class="filters__price">
                                <input type="number" name="price_from" placeholder="от" class="filters__input">
                                <input type="number" name="price_to" placeholder="до" class="filters__input">
                            </div>
                        </div>

                        <!-- Сортировка -->
                        <div class="filters__group">
                            <label class="filters__label">Сортировка</label>
                            <select name="sort" class="filters__select">
                                <option value="price_asc" selected>По возрастанию цены</option>
                                <option value="price_desc">По убыванию цены</option>
                            </select>
                        </div>

                        <!-- Кнопки -->
                        <div class="filters__buttons">
                            <button type="submit" class="filters__submit">Применить</button>
                            <button class="filters__reset">Сбросить</button>
                        </div>
                    </form>
                </aside>
                <div class="catalog__products">
                    <template id="cardTemplate">
                        <div class="card" data-id="">
                            <div class="card__photo">
                                <img src="" alt="">
                            </div>
                            <h2 class="card__name"></h2>
                            <p class="card__price"></p>
                            <button class="card__buy">Подробнее</button>
                        </div>
                    </template>
                </div>
            </div>

        </div>
    </main>
    <footer>
        <div class="footer__container">
            <div class="footer__copyright">
                © 2026 NOXIS. Учебный проект. Все товары и изображения принадлежат их владельцам.
            </div>
            <div class="footer__social">
                <a href="#">Telegram</a>
                <a href="#">Instagram</a>
            </div>
        </div>
    </footer>
    <!-- МОДАЛКА -->
    <div class="modal-overlay">
        <div class="modal">
            <div class="modal__wrapper">
                <div class="modal__photo">
                    <img src="./image/ex.png" alt="">
                </div>
                <div class="modal__text">
                    <div class="modal__close">
                        <svg xmlns="http://www.w3.org/2000/svg" width="23" height="23" viewBox="0 0 24 24" fill="none"
                            stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="15" y1="9" x2="9" y2="15"></line>
                            <line x1="9" y1="9" x2="15" y2="15"></line>
                        </svg>
                    </div>

                    <div class="modal__name">
                        <p>Здесь будет название</p>
                    </div>
                    <div class="modal__description">
                        <p>Сюда описание закинуть</p>
                    </div>
                    <div class="modal__size">
                        <label class="modal__label">Размер: </label>
                        <select name="size" class="modal__select">

                        </select>
                    </div>
                    <div class="modal__count">
                        <label for="">Количество: </label>
                        <input type="number" name="count" class="input__count" value="1">
                    </div>
                    <div class="modal__price">
                        <p>Цена:</p>
                        <p class="modal__price-total"></p>

                    </div>
                    <button class="modal__add ">Добавить в заказ</button>
                </div>

            </div>
        </div>

    </div>
    <script src="./js/validate.js"></script>
    <!-- <script type="module" src="./js/cart.js"></script> -->
    <script type="module" src="./js/script.js"></script>

</body>

</html>
