version: '3.8'

services:
  # Наш бэкенд
  backend:
    build: .
    container_name: merch-shop-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=merch_shop
      - JWT_SECRET=my_super_secret_key_123
    depends_on:
      - db

  # База данных MySQL
  db:
    image: mysql:8.0
    container_name: merch-shop-db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=merch_shop
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: