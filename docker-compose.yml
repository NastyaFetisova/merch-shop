version: '3.8'

services:
  # Наш бэкенд
  backend:
    build: .
    container_name: merch-shop-backend
    ports:
      - "5000:5000"   # Пробрасываем порт наружу
    environment:
      - PORT=5000
      - DB_HOST=db    # Здесь важно: host — это имя сервиса 'db'
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=merch_shop
      - JWT_SECRET=my_super_secret_key_123
    depends_on:
      - db            # Говорим, что бэкенд должен запускаться после базы данных

  # База данных MySQL
  db:
    image: mysql:8.0
    container_name: merch-shop-db
    ports:
      - "3307:3306"   # Пробрасываем порт 3307 на хосте, чтобы не конфликтовать с локальным MySQL
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=merch_shop
    volumes:
      - db_data:/var/lib/mysql   # Сохраняем данные базы, чтобы они не терялись при перезапуске

volumes:
  db_data: